<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Montserrat:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/buttons.css" />
  <link rel="stylesheet" href="assets/css/inputs.css" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(42,57,208,0.6), rgba(42,57,208,0.6)),
        url('assets/images/bg-login.jpg') center / cover no-repeat;
    }

    /* ─── CARD ─────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 54px 80px;
      width: 620px;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* ─── TOP: logo + título ────────────────────────────── */
    .card-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .card-logo {
      width: 88px;
      height: 62px;
      object-fit: contain;
    }

    .card-title {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 32px;
      line-height: normal;
      color: #333;
      text-align: center;
    }

    /* ─── FORM ──────────────────────────────────────────── */
    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 54px;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── BOTONES ───────────────────────────────────────── */
    .btn-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn-primary,
    .btn-submit {
      width: 100%;
      cursor: not-allowed;
    }

    .btn-primary.active { cursor: pointer; }

    .btn-ghost { width: 100%; }

    /* ─── PIE ───────────────────────────────────────────── */
    .card-footer {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: #333;
      text-align: center;
    }

    .card-footer a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-content">

      <!-- Logo + Título -->
      <div class="card-top">
        <img class="card-logo" src="assets/icons/logo-fid.svg" alt="FID by Lakaut" />
        <h1 class="card-title">Iniciar sesión</h1>
      </div>

      <!-- Formulario -->
      <div class="form">
        <div class="fields">

          <!-- Correo -->
          <div class="field-group">
            <label class="field-label" for="correo">Correo</label>
            <div class="input-wrap">
              <input id="correo" type="email" autocomplete="email" />
            </div>
          </div>

          <!-- Contraseña -->
          <div class="field-group">
            <label class="field-label" for="password">Contraseña</label>
            <div class="input-wrap">
              <input id="password" type="password" autocomplete="current-password" />
              <button class="eye-btn" type="button" onclick="togglePassword()" aria-label="Mostrar contraseña">
                <span class="icon" id="eye-icon">visibility_off</span>
              </button>
            </div>
          </div>

        </div>

        <!-- Botones -->
        <div class="btn-area">
          <button class="btn-primary" id="btn-submit" type="button"><span>Iniciar sesión</span></button>
          <button class="btn-ghost" type="button">Olvidé mi contraseña</button>
        </div>
      </div>

      <!-- ¿No tenés cuenta? -->
      <p class="card-footer">¿No tenés cuenta? <a href="#">Registrarse</a></p>

    </div>
  </div>

  <script>
    const correoInput  = document.getElementById('correo');
    const passwordInput = document.getElementById('password');
    const btnSubmit    = document.getElementById('btn-submit');

    function checkFields() {
      const filled = correoInput.value.trim() !== '' && passwordInput.value.trim() !== '';
      btnSubmit.classList.toggle('active', filled);
    }

    correoInput.addEventListener('input', checkFields);
    passwordInput.addEventListener('input', checkFields);

    btnSubmit.addEventListener('click', function () {
      if (btnSubmit.classList.contains('active')) {
        window.location.href = 'index.html';
      }
    });

    function togglePassword() {
      const icon = document.getElementById('eye-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.textContent = 'visibility';
      } else {
        passwordInput.type = 'password';
        icon.textContent = 'visibility_off';
      }
    }
  </script>

</body>
</html>
