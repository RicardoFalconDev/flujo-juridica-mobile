<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Montserrat:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/buttons.css" />
  <link rel="stylesheet" href="assets/css/inputs.css" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(42,57,208,0.6), rgba(42,57,208,0.6)),
        url('assets/images/bg-login.jpg') center / cover no-repeat;
    }

    /* ─── CARD ─────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 54px 80px;
      width: 620px;
      max-width: calc(100% - 32px); /* evita desborde en pantallas < 652px */
    }

    .card-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* ─── TOP: logo + título ────────────────────────────── */
    .card-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .card-logo {
      width: 88px;
      height: 62px;
      object-fit: contain;
    }

    .card-title {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 32px;
      line-height: normal;
      color: #333;
      text-align: center;
    }

    /* ─── FORM ──────────────────────────────────────────── */
    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 54px;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── BOTONES ───────────────────────────────────────── */
    .btn-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn-primary,
    .btn-submit {
      width: 100%;
      cursor: not-allowed;
    }

    .btn-primary.active { cursor: pointer; }

    .btn-ghost { width: 100%; }

    /* ─── PIE ───────────────────────────────────────────── */
    .card-footer {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: #333;
      text-align: center;
    }

    .card-footer a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: underline;
    }

    /* ─── MODAL OTP ─────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 12px;
      padding: 32px 24px;
      width: 600px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-direction: column;
      gap: 52px;
    }

    /* — Encabezado del modal — */
    .modal-header { display: flex; flex-direction: column; gap: 8px; }

    .modal-title {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 20px;
      line-height: 28px;
      color: #0b0c0e;
      margin: 0;
    }

    .modal-subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      letter-spacing: 0.1px;
      color: #575768;
      margin: 0;
    }

    .modal-subtitle strong { font-weight: 600; }

    /* — OTP grid — */
    :root { --otp-border: #dfdfdf; --otp-error: #ef4444; --otp-size: 72px; }

    .otp-grid {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    .otp-cell {
      width: var(--otp-size);
      height: var(--otp-size);
      background: #fff;
      border: 1px solid var(--otp-border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 22px;
      color: var(--text-dark, #0b0c0e);
      text-align: center;
      outline: none;
      caret-color: var(--blue);
      transition: border-color .15s, box-shadow .15s;
    }

    .otp-cell:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(42, 57, 208, 0.12);
    }

    .otp-grid.error .otp-cell {
      border-color: var(--otp-error);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.10);
    }

    .otp-helper-text {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      line-height: 16px;
      letter-spacing: 0.1px;
      color: #505050;
    }

    .otp-timer.expired { color: var(--otp-error); }

    .otp-error-msg {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      line-height: 20px;
      color: var(--otp-error);
    }

    .otp-error-msg.visible { display: flex; }
    .otp-error-msg .icon { font-size: 16px; }

    /* — Botones del modal — */
    .modal-actions {
      display: flex;
      gap: 24px;
      width: 100%;
    }

    .modal-actions .btn-resend,
    .modal-actions .btn-continue { flex: 1; }

    @media (max-width: 480px) {
      body { padding: 16px; align-items: flex-start; padding-top: 40px; }
      .card { width: 100%; padding: 32px 20px; border-radius: 16px; }
      .modal-card { width: calc(100% - 32px); padding: 24px 16px; border-radius: 12px; }
      /* OTP cells: 72px × 6 = 432px → no caben. Reducir a 40px */
      :root { --otp-size: 40px; }
      .otp-cell { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-content">

      <!-- Logo + Título -->
      <div class="card-top">
        <img class="card-logo" src="assets/icons/logo-fid.svg" alt="FID by Lakaut" />
        <h1 class="card-title">Iniciar sesión</h1>
      </div>

      <!-- Formulario -->
      <div class="form">
        <div class="fields">

          <!-- Correo -->
          <div class="field-group">
            <label class="field-label" for="correo">Correo</label>
            <div class="input-wrap">
              <input id="correo" type="email" autocomplete="email" />
            </div>
          </div>

          <!-- Contraseña -->
          <div class="field-group">
            <label class="field-label" for="password">Contraseña</label>
            <div class="input-wrap">
              <input id="password" type="password" autocomplete="current-password" />
              <button class="eye-btn" type="button" onclick="togglePassword()" aria-label="Mostrar contraseña">
                <span class="icon" id="eye-icon">visibility_off</span>
              </button>
            </div>
          </div>

        </div>

        <!-- Botones -->
        <div class="btn-area">
          <button class="btn-submit" id="btn-submit" type="button" disabled><span>Iniciar sesión</span></button>
          <button class="btn-ghost" type="button">Olvidé mi contraseña</button>
        </div>
      </div>

      <!-- ¿No tenés cuenta? -->
      <p class="card-footer">¿No tenés cuenta? <a href="#">Registrarse</a></p>

    </div>
  </div>

  <!-- ─── MODAL OTP ───────────────────────────────────────── -->
  <div class="modal-overlay" id="otp-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">

      <!-- Encabezado -->
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Validación de seguridad</h2>
        <p class="modal-subtitle">
          Ingresá el código que enviamos al <strong>+54 XX XXXX-X78</strong>.
        </p>
      </div>

      <!-- OTP + acciones -->
      <div style="display:flex;flex-direction:column;gap:52px;">

        <!-- Grid + mensajes -->
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div class="otp-grid" id="otp-grid">
            <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" />
            <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" />
            <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" />
            <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" />
            <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" />
            <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" />
          </div>
          <span class="otp-helper-text otp-timer" id="otp-timer">El código vence en 00:50</span>
          <span class="otp-error-msg" id="otp-error">
            <span class="icon">error</span>
            El código ingresado es incorrecto.
          </span>
        </div>

        <!-- Botones -->
        <div class="modal-actions">
          <button class="btn-resend" id="btn-resend" type="button" onclick="reenviarCodigo()">
            <span>Reenviar código</span>
          </button>
          <button class="btn-continue" id="btn-verify" type="button" onclick="verificarCodigo()">
            <span>Verificar código</span>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    /* ── Login form ─────────────────────────────────────── */
    const correoInput   = document.getElementById('correo');
    const passwordInput = document.getElementById('password');
    const btnSubmit     = document.getElementById('btn-submit');

    function checkFields() {
      const filled = correoInput.value.trim() !== '' && passwordInput.value.trim() !== '';
      btnSubmit.classList.toggle('active', filled);
      btnSubmit.disabled = !filled;
    }

    correoInput.addEventListener('input', checkFields);
    passwordInput.addEventListener('input', checkFields);

    btnSubmit.addEventListener('click', function () {
      if (btnSubmit.classList.contains('active')) {
        abrirModalOTP();
      }
    });

    function togglePassword() {
      const icon = document.getElementById('eye-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.textContent = 'visibility';
      } else {
        passwordInput.type = 'password';
        icon.textContent = 'visibility_off';
      }
    }

    /* ── Modal OTP ──────────────────────────────────────── */
    const modal    = document.getElementById('otp-modal');
    const grid     = document.getElementById('otp-grid');
    const cells    = Array.from(grid.querySelectorAll('.otp-cell'));
    const timerEl  = document.getElementById('otp-timer');
    const errorEl  = document.getElementById('otp-error');
    const btnResend = document.getElementById('btn-resend');
    const btnVerify = document.getElementById('btn-verify');

    let timerInterval;

    function abrirModalOTP() {
      modal.classList.add('open');
      resetOTP();
      startTimer();
      cells[0].focus();
    }

    function resetOTP() {
      cells.forEach(c => c.value = '');
      setError(false);
      updateVerifyBtn();
    }

    /* — Timer 50 s — */
    function startTimer() {
      clearInterval(timerInterval);
      let seconds = 50;
      timerEl.classList.remove('expired');
      btnResend.classList.remove('active');
      timerEl.textContent = formatTimer(seconds);

      timerInterval = setInterval(() => {
        seconds--;
        timerEl.textContent = formatTimer(seconds);
        if (seconds <= 0) {
          clearInterval(timerInterval);
          timerEl.classList.add('expired');
          timerEl.textContent = 'El código ha vencido.';
          btnResend.classList.add('active');
        }
      }, 1000);
    }

    function formatTimer(s) {
      const m = Math.floor(s / 60);
      const ss = String(s % 60).padStart(2, '0');
      return `El código vence en ${m > 0 ? m + ':' : '00:'}${ss}`;
    }

    /* — Estado — */
    function getValue() { return cells.map(c => c.value).join(''); }

    function setError(show) {
      grid.classList.toggle('error', show);
      errorEl.classList.toggle('visible', show);
      timerEl.style.display = show ? 'none' : '';
    }

    function updateVerifyBtn() {
      const full = getValue().length === 6 && !grid.classList.contains('error');
      btnVerify.classList.toggle('active', full);
      btnVerify.disabled = !full;
    }

    /* — Comportamiento celdas — */
    cells.forEach((cell, i) => {
      cell.addEventListener('input', (e) => {
        if (grid.classList.contains('error')) { setError(false); timerEl.style.display = ''; }
        const val = e.target.value.replace(/\D/g, '');
        cell.value = val ? val[val.length - 1] : '';
        if (cell.value && i < cells.length - 1) cells[i + 1].focus();
        updateVerifyBtn();
      });

      cell.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
          if (cell.value) { cell.value = ''; }
          else if (i > 0) { cells[i - 1].focus(); cells[i - 1].value = ''; }
          if (grid.classList.contains('error')) { setError(false); timerEl.style.display = ''; }
          updateVerifyBtn();
        }
        if (e.key === 'ArrowLeft'  && i > 0)              { e.preventDefault(); cells[i - 1].focus(); }
        if (e.key === 'ArrowRight' && i < cells.length-1) { e.preventDefault(); cells[i + 1].focus(); }
      });

      cell.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
        pasted.split('').forEach((d, j) => { if (cells[j]) cells[j].value = d; });
        const next = cells.findIndex(c => !c.value);
        (next >= 0 ? cells[next] : cells[cells.length - 1]).focus();
        if (grid.classList.contains('error')) { setError(false); timerEl.style.display = ''; }
        updateVerifyBtn();
      });

      cell.addEventListener('click', () => cell.select());
    });

    /* — Reenviar — */
    function reenviarCodigo() {
      resetOTP();
      startTimer();
      cells[0].focus();
    }

    /* — Verificar — */
    function verificarCodigo() {
      const code = getValue();
      if (code.length < 6) return;
      if (code === '000000') { setError(true); updateVerifyBtn(); return; }
      clearInterval(timerInterval);
      window.location.href = 'pago.html';
    }
  </script>

</body>
</html>
