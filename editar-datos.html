<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar datos | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Montserrat:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/header.css" />
  <link rel="stylesheet" href="assets/css/buttons.css" />
  <link rel="stylesheet" href="assets/css/inputs.css" />

  <style>
    /* ─── FORM ───────────────────────────────────────── */
    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* .input-wrap override: esta página usa height:56px y borde 1px */
    .input-wrap {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      gap: 8px;
      height: 56px;
      transition: border-color .15s;
    }

    .input-wrap:focus-within { border-color: var(--blue); }

    .input-wrap input {
      flex: 1;
      min-width: 0;
      font-family: 'Open Sans', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 24px;
      color: var(--text-main);
      border: none;
      outline: none;
      background: transparent;
    }

    .input-wrap input::placeholder { color: var(--text-ph); }

    /* Select nativo estilizado */
    .select-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 56px;
      transition: border-color .15s;
    }

    .select-wrap:focus-within { border-color: var(--blue); }

    .select-wrap select {
      flex: 1;
      width: 100%;
      height: 100%;
      padding: 0 40px 0 16px;
      font-family: 'Open Sans', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 24px;
      color: var(--text-main);
      background: transparent;
      border: none;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .select-wrap .icon {
      position: absolute;
      right: 14px;
      font-size: 20px;
      color: #c0c0cc;
      pointer-events: none;
    }

    /* ─── BOTONES — sizing específico ───────────────── */
    .btn-row { gap: 16px; justify-content: center; }
    .btn-back { flex: 1; max-width: 256px; }
    .btn-submit { flex: 1; max-width: 256px; }
  </style>
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header class="header">
    <img class="header-logo"
         src="https://www.figma.com/api/mcp/asset/f419695b-9c40-4cf1-8c13-87318dc06d4c"
         alt="FID by Lakaut"
         width="55" height="38" />

    <button class="icon-btn" onclick="window.location.href='paso2.html'" aria-label="Volver">
      <span class="icon">arrow_back</span>
    </button>

    <span class="header-title">Editar datos</span>

    <button class="icon-btn" aria-label="Cerrar">
      <span class="icon">close</span>
    </button>
  </header>

  <!-- ── CONTENT ── -->
  <main class="content-area">
    <div class="main-card">

      <div class="title-section">
        <h2 class="card-title">Corregí tus datos</h2>
        <p class="card-subtitle">Modificá la información que esté incorrecta y avanzá.</p>
      </div>

      <div class="form-fields">

        <!-- DNI -->
        <div class="field">
          <label class="field-label">DNI</label>
          <div class="input-wrap">
            <input type="text" id="field-dni" value="99.999.999"
                   inputmode="numeric" maxlength="10"
                   oninput="formatDNI(this)" />
          </div>
        </div>

        <!-- Género -->
        <div class="field">
          <label class="field-label" for="field-genero">Género</label>
          <div class="select-wrap">
            <select id="field-genero" onchange="checkChanges()">
              <option value="masculino" selected>Masculino</option>
              <option value="femenino">Femenino</option>
              <option value="no_binario">No binario</option>
            </select>
            <span class="icon">expand_more</span>
          </div>
        </div>

        <!-- Correo electrónico -->
        <div class="field">
          <label class="field-label">Correo electrónico</label>
          <div class="input-wrap">
            <input type="email" id="field-email" value="ejemplo@mail.com" oninput="checkChanges()" />
          </div>
        </div>

        <!-- Número de teléfono -->
        <div class="field">
          <label class="field-label">Número de teléfono</label>
          <div class="input-wrap">
            <input type="tel" id="field-tel" value="11 123345678"
                   inputmode="numeric" maxlength="14"
                   oninput="formatPhone(this)" />
          </div>
          <span class="field-helper">Código de área + número</span>
        </div>

        <!-- Botones -->
        <div class="btn-row">
          <button class="btn-back" onclick="window.location.href='paso2.html'">
            <span>Volver</span>
          </button>
          <button class="btn-submit" id="btn-guardar"
                  onclick="guardarCambios()">
            <span>Guardar cambios</span>
          </button>
        </div>

      </div>
    </div>
  </main>

</div>

<script>
  /* ── Formateadores ────────────────────────────────── */

  function formatDNI(input) {
    const pos   = input.selectionStart;
    const before = input.value.slice(0, pos).replace(/\D/g, '').length;

    // Solo dígitos, máximo 8
    const digits = input.value.replace(/\D/g, '').slice(0, 8);

    let formatted = digits;
    if (digits.length > 5)
      formatted = digits.slice(0,2) + '.' + digits.slice(2,5) + '.' + digits.slice(5);
    else if (digits.length > 2)
      formatted = digits.slice(0,2) + '.' + digits.slice(2);

    input.value = formatted;

    // Restaurar posición aproximada del cursor
    let newPos = 0, count = 0;
    for (let i = 0; i < formatted.length; i++) {
      if (/\d/.test(formatted[i])) count++;
      if (count === before) { newPos = i + 1; break; }
    }
    input.setSelectionRange(newPos, newPos);
    checkChanges();
  }

  function formatPhone(input) {
    const pos    = input.selectionStart;
    const before = input.value.slice(0, pos).replace(/\D/g, '').length;

    // Solo dígitos, máximo 11 (área 2-3 + número 8)
    const digits = input.value.replace(/\D/g, '').slice(0, 11);

    let formatted = digits;
    if (digits.length > 2)
      formatted = digits.slice(0, 2) + ' ' + digits.slice(2);

    input.value = formatted;

    // Restaurar posición aproximada del cursor
    let newPos = 0, count = 0;
    for (let i = 0; i < formatted.length; i++) {
      if (/\d/.test(formatted[i])) count++;
      if (count === before) { newPos = i + 1; break; }
    }
    input.setSelectionRange(newPos, newPos);
    checkChanges();
  }

  /* ── Nombres random por género (simulación RENAPER) ── */
  const NOMBRES = {
    masculino:  ['Lucas Pereyra', 'Matías Sánchez', 'Facundo Romero', 'Nicolás Acosta', 'Ignacio Vega'],
    femenino:   ['Valentina López', 'Camila Torres', 'Lucía Fernández', 'Agustina Díaz', 'Martina Ruiz'],
    no_binario: ['Alex Medina', 'Jordan Suárez', 'Morgan Herrera'],
  };

  function nombreRandom(genero) {
    const lista = NOMBRES[genero] || NOMBRES.masculino;
    return lista[Math.floor(Math.random() * lista.length)];
  }

  function cuilDesdeGenero(dni, genero) {
    const digits = dni.replace(/\D/g, '');
    const prefijo = genero === 'femenino' ? '27' : '20';
    const base = prefijo + '-' + digits + '-';
    const verif = Math.floor(Math.random() * 9);
    return base + verif;
  }

  /* ── Activar botón ───────────────────────────────── */
  const INITIAL = {
    dni:    document.getElementById('field-dni').value,
    genero: document.getElementById('field-genero').value,
    email:  document.getElementById('field-email').value,
    tel:    document.getElementById('field-tel').value,
  };

  function checkChanges() {
    const changed =
      document.getElementById('field-dni').value    !== INITIAL.dni    ||
      document.getElementById('field-genero').value !== INITIAL.genero ||
      document.getElementById('field-email').value  !== INITIAL.email  ||
      document.getElementById('field-tel').value    !== INITIAL.tel;

    const btn = document.getElementById('btn-guardar');
    btn.classList.toggle('active', changed);
  }

  function guardarCambios() {
    if (!document.getElementById('btn-guardar').classList.contains('active')) return;

    const dni    = document.getElementById('field-dni').value;
    const genero = document.getElementById('field-genero').value;
    const dniCambio    = dni    !== INITIAL.dni;
    const generoCambio = genero !== INITIAL.genero;

    // Si cambió DNI o género, simular respuesta de RENAPER con datos nuevos
    if (dniCambio || generoCambio) {
      const generoLabel = document.getElementById('field-genero')
                            .options[document.getElementById('field-genero').selectedIndex].text;
      sessionStorage.setItem('renaper_nombre', nombreRandom(genero));
      sessionStorage.setItem('renaper_dni',    dni);
      sessionStorage.setItem('renaper_cuil',   cuilDesdeGenero(dni, genero));
      sessionStorage.setItem('renaper_genero', generoLabel);
    }

    window.location.href = 'paso2.html';
  }
</script>
</body>
</html>
