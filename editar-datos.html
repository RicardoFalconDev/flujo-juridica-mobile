<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar datos | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Montserrat:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/header.css" />
  <link rel="stylesheet" href="assets/css/buttons.css" />
  <link rel="stylesheet" href="assets/css/inputs.css" />

  <style>
    /* ─── GRID 2 COLUMNAS ────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* ─── BOTONES ────────────────────────────────────── */
    .btn-row { gap: 16px; }
    .btn-back    { flex: 1; }
    .btn-submit  { flex: 1; }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; gap: 16px; }
    }

    /* ─── TELÉFONO: flag dentro del input ────────────── */
    .phone-flag {
      width: 36px;
      height: 24px;
      flex-shrink: 0;
      object-fit: cover;
      border-radius: 2px;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header class="header">
    <img class="header-logo" src="assets/icons/logo-fid.svg" alt="FID by Lakaut" />
    <button class="icon-btn" onclick="window.location.href='paso2.html'" aria-label="Volver">
      <span class="icon">arrow_back</span>
    </button>
    <span class="header-title">Editar datos</span>
    <button class="icon-btn" onclick="window.location.href='paso2.html'" aria-label="Cerrar">
      <span class="icon">close</span>
    </button>
  </header>

  <!-- ── CONTENT ── -->
  <main class="content-area">
    <div class="main-card">

      <div class="title-section">
        <h2 class="card-title">Corregí tus datos</h2>
        <p class="card-subtitle">Modificá la información que esté incorrecta y avanzá.</p>
      </div>

      <div class="form-grid">

        <!-- DNI -->
        <div class="field">
          <label class="field-label" for="field-dni">DNI</label>
          <div class="input-wrap">
            <input type="text" id="field-dni" value="99.999.999"
                   inputmode="numeric" maxlength="10"
                   oninput="formatDNI(this)" />
          </div>
        </div>

        <!-- Género -->
        <div class="field">
          <label class="field-label" for="field-genero">Género</label>
          <div class="sel-wrap">
            <select id="field-genero" class="field-select selected" onchange="checkChanges()">
              <option value="masculino" selected>Masculino</option>
              <option value="femenino">Femenino</option>
              <option value="no_binario">No binario</option>
            </select>
          </div>
        </div>

        <!-- Correo electrónico -->
        <div class="field">
          <label class="field-label" for="field-email">Correo electrónico</label>
          <div class="input-wrap">
            <input type="email" id="field-email" value="ejemplo@mail.com"
                   oninput="checkChanges()" />
          </div>
        </div>

        <!-- Número de teléfono -->
        <div class="field">
          <label class="field-label" for="field-tel">Número de teléfono</label>
          <div class="input-wrap">
            <img class="phone-flag" src="assets/icons/flag-ar.svg" alt="AR" />
            <input type="tel" id="field-tel" value="11 1234 5678"
                   inputmode="numeric" maxlength="14"
                   oninput="formatPhone(this)" />
          </div>
          <span class="field-helper">Código de área + número, sin el 9 ni el 15.</span>
        </div>

      </div>

      <!-- Botones -->
      <div class="btn-row">
        <button class="btn-outline btn-back" onclick="window.location.href='paso2.html'">
          <span>Volver</span>
        </button>
        <button class="btn-primary btn-submit" id="btn-confirmar"
                onclick="confirmarCambios()">
          <span>Confirmar</span>
        </button>
      </div>

    </div>
  </main>

</div>

<script>
  /* ── Cargar datos desde paso2 ───────────────────── */
  (function cargarDatos() {
    const dni    = sessionStorage.getItem('edit_dni');
    const genero = sessionStorage.getItem('edit_genero');

    if (dni)    document.getElementById('field-dni').value = dni;
    if (genero) {
      const sel = document.getElementById('field-genero');
      const opt = Array.from(sel.options).find(o => o.value === genero);
      if (opt) sel.value = genero;
    }
  })();

  /* ── Formateadores ────────────────────────────────── */
  function formatDNI(input) {
    const pos    = input.selectionStart;
    const before = input.value.slice(0, pos).replace(/\D/g, '').length;
    const digits = input.value.replace(/\D/g, '').slice(0, 8);
    let formatted = digits;
    if (digits.length > 5)
      formatted = digits.slice(0,2) + '.' + digits.slice(2,5) + '.' + digits.slice(5);
    else if (digits.length > 2)
      formatted = digits.slice(0,2) + '.' + digits.slice(2);
    input.value = formatted;
    let newPos = 0, count = 0;
    for (let i = 0; i < formatted.length; i++) {
      if (/\d/.test(formatted[i])) count++;
      if (count === before) { newPos = i + 1; break; }
    }
    input.setSelectionRange(newPos, newPos);
    checkChanges();
  }

  function formatPhone(input) {
    const pos    = input.selectionStart;
    const before = input.value.slice(0, pos).replace(/\D/g, '').length;
    const digits = input.value.replace(/\D/g, '').slice(0, 11);
    let formatted = digits;
    if (digits.length > 2)
      formatted = digits.slice(0, 2) + ' ' + digits.slice(2);
    input.value = formatted;
    let newPos = 0, count = 0;
    for (let i = 0; i < formatted.length; i++) {
      if (/\d/.test(formatted[i])) count++;
      if (count === before) { newPos = i + 1; break; }
    }
    input.setSelectionRange(newPos, newPos);
    checkChanges();
  }

  /* ── Nombres simulados (RENAPER) ─────────────────── */
  const NOMBRES = {
    masculino:  ['Lucas Pereyra', 'Matías Sánchez', 'Facundo Romero', 'Nicolás Acosta'],
    femenino:   ['Valentina López', 'Camila Torres', 'Lucía Fernández', 'Agustina Díaz'],
    no_binario: ['Alex Medina', 'Jordan Suárez', 'Morgan Herrera'],
  };

  function nombreRandom(genero) {
    const lista = NOMBRES[genero] || NOMBRES.masculino;
    return lista[Math.floor(Math.random() * lista.length)];
  }

  function cuilDesdeGenero(dni, genero) {
    const digits  = dni.replace(/\D/g, '');
    const prefijo = genero === 'femenino' ? '27' : '20';
    return prefijo + '-' + digits + '-' + Math.floor(Math.random() * 9);
  }

  /* ── Snapshot inicial (después de cargar datos) ─── */
  const INITIAL = {
    dni:    document.getElementById('field-dni').value,
    genero: document.getElementById('field-genero').value,
    email:  document.getElementById('field-email').value,
    tel:    document.getElementById('field-tel').value,
  };

  function checkChanges() {
    const changed =
      document.getElementById('field-dni').value    !== INITIAL.dni    ||
      document.getElementById('field-genero').value !== INITIAL.genero ||
      document.getElementById('field-email').value  !== INITIAL.email  ||
      document.getElementById('field-tel').value    !== INITIAL.tel;
    document.getElementById('btn-confirmar').classList.toggle('active', changed);
  }

  function confirmarCambios() {
    if (!document.getElementById('btn-confirmar').classList.contains('active')) return;
    const dni    = document.getElementById('field-dni').value;
    const genero = document.getElementById('field-genero').value;
    if (dni !== INITIAL.dni || genero !== INITIAL.genero) {
      const generoLabel = document.getElementById('field-genero')
                            .options[document.getElementById('field-genero').selectedIndex].text;
      sessionStorage.setItem('renaper_nombre', nombreRandom(genero));
      sessionStorage.setItem('renaper_dni',    dni);
      sessionStorage.setItem('renaper_cuil',   cuilDesdeGenero(dni, genero));
      sessionStorage.setItem('renaper_genero', generoLabel);
    }
    window.location.href = 'paso2.html';
  }
</script>
</body>
</html>
