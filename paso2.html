<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datos personales | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    :root {
      --blue:       #2A39D0;
      --text-dark:  #0b0c0e;
      --text-sub:   #575768;
      --text-main:  #3b3a45;
      --border:     #e1e1eb;
      --border-card:#dee2e6;
      --border-hdr: #f2f2f8;
      --bg-page:    #f8f9fa;
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
    }

    /* Material Symbols */
    .icon {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      white-space: nowrap;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ─── PAGE ───────────────────────────────────────── */
    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-page);
    }

    /* ─── HEADER ─────────────────────────────────────── */
    .header {
      height: 80px;
      background: #fff;
      border-bottom: 1px solid var(--border-hdr);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      width: 46px;
      height: 32px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-main);
    }

    .icon-btn .icon { font-size: 20px; }

    .header-title {
      flex: 1;
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;
      color: var(--text-main);
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    /* ─── CONTENT AREA ───────────────────────────────── */
    .content-area {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    /* ─── MAIN CARD ──────────────────────────────────── */
    .main-card {
      width: 600px;
      background: #fff;
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Title section */
    .title-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title {
      font-weight: 500;
      font-size: 20px;
      line-height: 28px;
      color: var(--text-dark);
    }

    .card-subtitle {
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      color: var(--text-sub);
      letter-spacing: 0.1px;
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    .card-subtitle strong {
      font-weight: 600;
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    /* ─── INNER CONTENT (500px centrado) ─────────────── */
    .card-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
    }

    /* ─── DATA CARD ──────────────────────────────────── */
    .data-card {
      width: 500px;
      background: #fff;
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Data row */
    .data-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.5;
      color: #000;
    }

    .data-label {
      font-weight: 400;
      width: 138px;
      flex-shrink: 0;
      color: #000;
    }

    .data-value {
      flex: 1;
      font-weight: 500;
      text-align: right;
      color: #000;
    }

    .data-edit {
      color: var(--text-sub);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .data-edit .icon {
      font-size: 20px;
      cursor: pointer;
      border-radius: 6px;
      padding: 2px;
      transition: background .15s, color .15s;
    }

    .data-edit .icon:hover { background: #f0f0f5; color: var(--blue); }

    /* Estado editable */
    .data-row.editing .data-value { display: none; }

    .domicilio-input {
      display: none;
      flex: 1;
      text-align: right;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: #000;
      border: none;
      outline: none;
      background: transparent;
      border-bottom: 1.5px solid var(--blue);
      padding-bottom: 2px;
      min-width: 0;
    }

    .data-row.editing .domicilio-input { display: block; }

    .data-edit.save-mode .icon { color: var(--blue); }

    .data-divider {
      height: 1px;
      background: #d1d1d1;
      opacity: 0.5;
      width: 100%;
    }

    /* ─── BUTTONS ROW ────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 24px;
      width: 500px;
    }

    .btn-outline {
      flex: 1;
      height: 48px;
      background: #fff;
      border: 1px solid #e1e1e6;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
    }

    .btn-outline span {
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 24px;
      color: #494949;
    }

    .btn-primary {
      flex: 1;
      height: 48px;
      background: var(--blue);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
    }

    .btn-primary span {
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 24px;
      color: #fff;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header class="header">
    <img class="header-logo"
         src="https://www.figma.com/api/mcp/asset/f419695b-9c40-4cf1-8c13-87318dc06d4c"
         alt="FID by Lakaut"
         width="55" height="38" />

    <button class="icon-btn" onclick="window.location.href='paso1.html'" aria-label="Volver">
      <span class="icon">arrow_back</span>
    </button>

    <span class="header-title">Datos personales</span>

    <button class="icon-btn" aria-label="Cerrar">
      <span class="icon">close</span>
    </button>
  </header>

  <!-- ── CONTENT ── -->
  <main class="content-area">
    <div class="main-card">

      <!-- Título -->
      <div class="title-section">
        <h2 class="card-title">Verificá tus datos personales</h2>
        <p class="card-subtitle">
          Estos datos se van a asociar a tu cuenta y
          <strong>certificado digital.</strong>
        </p>
      </div>

      <!-- Cuerpo centrado -->
      <div class="card-body">

        <!-- Card de datos -->
        <div class="data-card">
          <div class="data-row">
            <span class="data-label">Nombre</span>
            <span class="data-value" id="val-nombre">Ezequiel Rodriguez</span>
          </div>
          <div class="data-divider"></div>

          <div class="data-row">
            <span class="data-label">DNI</span>
            <span class="data-value" id="val-dni">123456789</span>
          </div>
          <div class="data-divider"></div>

          <div class="data-row">
            <span class="data-label">CUIL</span>
            <span class="data-value" id="val-cuil">20-123456789-3</span>
          </div>
          <div class="data-divider"></div>

          <div class="data-row">
            <span class="data-label">Género</span>
            <span class="data-value" id="val-genero">Masculino</span>
          </div>
          <div class="data-divider"></div>

          <div class="data-row" id="domicilio-row">
            <span class="data-label">Domicilio</span>
            <span class="data-value" id="domicilio-value">Av. Siempreviva 123</span>
            <input class="domicilio-input" id="domicilio-input" type="text" value="Av. Siempreviva 123" />
            <span class="data-edit" id="domicilio-edit" onclick="toggleDomicilio()">
              <span class="icon" id="domicilio-icon">edit</span>
            </span>
          </div>
        </div>

        <!-- Botones -->
        <div class="btn-row">
          <button class="btn-outline" onclick="window.location.href='editar-datos.html'">
            <span>No soy esa persona</span>
          </button>
          <button class="btn-primary" onclick="window.location.href='otp-correo.html'">
            <span>Confirmar</span>
          </button>
        </div>

      </div>
    </div>
  </main>

</div>

<script>
  function toggleDomicilio() {
    const row   = document.getElementById('domicilio-row');
    const input = document.getElementById('domicilio-input');
    const value = document.getElementById('domicilio-value');
    const edit  = document.getElementById('domicilio-edit');
    const icon  = document.getElementById('domicilio-icon');
    const editing = row.classList.contains('editing');

    if (!editing) {
      // Entrar en modo edición
      row.classList.add('editing');
      edit.classList.add('save-mode');
      icon.textContent = 'check';
      input.value = value.textContent.trim();
      input.focus();
      // Mover cursor al final
      input.setSelectionRange(input.value.length, input.value.length);
    } else {
      // Guardar y salir de modo edición
      const newVal = input.value.trim() || value.textContent.trim();
      value.textContent = newVal;
      row.classList.remove('editing');
      edit.classList.remove('save-mode');
      icon.textContent = 'edit';
    }
  }

  // También guardar al presionar Enter
  document.getElementById('domicilio-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') toggleDomicilio();
    if (e.key === 'Escape') {
      document.getElementById('domicilio-row').classList.remove('editing');
      document.getElementById('domicilio-edit').classList.remove('save-mode');
      document.getElementById('domicilio-icon').textContent = 'edit';
    }
  });

  // Actualizar datos si vienen de editar-datos (simulación RENAPER)
  const renaperNombre = sessionStorage.getItem('renaper_nombre');
  const renaperDNI    = sessionStorage.getItem('renaper_dni');
  const renaperCUIL   = sessionStorage.getItem('renaper_cuil');
  const renaperGenero = sessionStorage.getItem('renaper_genero');

  if (renaperNombre) {
    document.getElementById('val-nombre').textContent = renaperNombre;
    sessionStorage.removeItem('renaper_nombre');
  }
  if (renaperDNI) {
    document.getElementById('val-dni').textContent = renaperDNI;
    sessionStorage.removeItem('renaper_dni');
  }
  if (renaperCUIL) {
    document.getElementById('val-cuil').textContent = renaperCUIL;
    sessionStorage.removeItem('renaper_cuil');
  }
  if (renaperGenero) {
    document.getElementById('val-genero').textContent = renaperGenero;
    sessionStorage.removeItem('renaper_genero');
  }
</script>
</body>
</html>
